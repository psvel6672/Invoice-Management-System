<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Invoice Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.7/css/dataTables.tailwindcss.min.css"
    />

    <link rel="stylesheet" href="/assets/styles.css" />
  </head>

  <body class="bg-slate-100 font-sans">
    <div class="flex h-screen overflow-hidden">
      <!-- SIDEBAR -->
      <div
        id="sidebar"
        class="bg-slate-900 text-white w-64 flex flex-col transition-all duration-300 fixed md:relative z-40 h-full -translate-x-full md:translate-x-0"
      >
        <!-- Sidebar Header -->
        <div
          class="flex items-center justify-between p-5 border-b border-slate-700"
        >
          <h1 id="sidebarTitle" class="text-lg font-bold">PS Invoice</h1>

          <button id="closeSidebar" class="md:hidden text-white text-xl">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- Menu -->
        <nav class="flex-1 p-3 space-y-2 sidebar-scroll">
          <a
            href="/"
            class="menu-item flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800"
          >
            <i class="fa-solid fa-chart-line"></i>
            <span class="menu-text">Dashboard</span>
          </a>

          <a
            href="/allproducts"
            class="menu-item flex items-center gap-3 p-3 rounded-lg bg-blue-600"
          >
            <i class="fa-solid fa-box"></i>
            <span class="menu-text">Products</span>
          </a>

          <a href="/allinvoices"
            class="menu-item flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800"
          >
            <i class="fa-solid fa-file-invoice"></i>
            <span class="menu-text">Invoices</span>
          </a>

          <a
            href="/allcustomers"
            class="menu-item flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800"
          >
            <i class="fa-solid fa-users"></i>
            <span class="menu-text">Customers</span>
          </a>

          <a href="/allsysusers"
            class="menu-item flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800"
          >
            <i class="fa-solid fa-user-shield"></i>
            <span class="menu-text">System Users</span>
          </a>
        </nav>
      </div>

      <!-- MAIN AREA -->
      <div class="flex-1 flex flex-col">
        <!-- NAVBAR -->
        <header
          class="bg-white shadow-sm px-6 py-4 flex justify-between items-center"
        >
          <div class="flex items-center gap-4">
            <button id="menuBtn" class="text-slate-600 text-xl">
              <i class="fa fa-bars"></i>
            </button>

            <h2 class="text-xl font-semibold text-slate-700">Products</h2>
          </div>

          <!-- PROFILE DROPDOWN -->
          <div class="relative">
            <button id="profileBtn" class="flex items-center gap-3">
              <div class="text-right">
                <p class="text-sm font-semibold text-slate-700">Admin</p>
                <p class="text-xs text-slate-500">Administrator</p>
              </div>

              <i class="fa-solid fa-circle-user text-3xl text-slate-600"></i>
            </button>

            <div
              id="profileDropdown"
              class="hidden absolute right-0 mt-3 w-48 bg-white rounded-lg shadow-lg border"
            >
              <a
                href="#"
                class="flex items-center gap-3 px-4 py-2 text-sm hover:bg-slate-100"
              >
                <i class="fa fa-user"></i>
                Profile
              </a>

              <a
                href="#"
                class="flex items-center gap-3 px-4 py-2 text-sm hover:bg-slate-100"
              >
                <i class="fa fa-gear"></i>
                Settings
              </a>

              <hr />

              <a onclick="openLogoutModal();"
                href="#"
                class="flex items-center gap-3 px-4 py-2 text-sm text-red-500 hover:bg-red-50"
              >
                <i class="fa fa-right-from-bracket"></i>
                Logout
              </a>
            </div>
          </div>
        </header>

        <!-- CONTENT -->
        <main class="p-6 overflow-y-auto">
          <!-- PAGE HEADER -->

          <div class="flex justify-between items-center mb-6">
            <div>
              <h1 class="text-2xl font-semibold text-slate-800">
                Add Products
              </h1>
              <p class="text-sm text-slate-500 mt-1">
                Create multiple products at the same time
              </p>
            </div>

            <div class="flex flex-row gap-3">
              <button
                id="addProductRowBtn"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm"
              >
                <i class="fa fa-plus"></i>
                Add Product
              </button>
              <a
                href="/allproducts"
                class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm flex items-center gap-2"
              >
                <i class="fa fa-arrow-left"></i>
                Go Back
              </a>
            </div>
          </div>

          <!-- FORM CARD -->

          <div class="bg-white rounded-xl shadow-sm p-6">
            <form id="productForm">
              <!-- TABLE -->

              <div class="overflow-x-auto">
                <table class="w-full text-sm min-w-[700px]">
                  <thead class="border-b text-slate-500">
                    <tr>
                      <th class="text-left px-4 py-3">Product Name</th>
                      <th class="text-left px-4 py-3">Description</th>
                      <th class="text-left px-4 py-3 w-[150px]">Price</th>
                      <th class="text-left px-4 py-3 w-[80px]">Action</th>
                    </tr>
                  </thead>

                  <tbody id="addProductTableBody" class="divide-y">
                    <tr class="product-row">
                      <td class="px-4 py-3">
                        <input
                          type="text"
                          name="product_name[]"
                          placeholder="Product Name"
                          class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                        />
                      </td>

                      <td class="px-4 py-3">
                        <input
                          type="text"
                          name="product_desc[]"
                          placeholder="Product Description"
                          class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                        />
                      </td>

                      <td class="px-4 py-3">
                        <input
                          type="number"
                          name="product_price[]"
                          placeholder="Price"
                          class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                        />
                      </td>

                      <td class="px-4 py-3">
                        <button
                          type="button"
                          class="removeRow text-red-500 hover:text-red-700"
                        >
                          <i class="fa fa-trash"></i>
                        </button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- SAVE BUTTON -->

              <div class="mt-6 flex justify-end">
                <button
                  type="submit"
                  class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg flex items-center gap-2 text-sm"
                >
                  <i class="fa fa-save"></i>
                  Save Products
                </button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <script src="/assets/script.js"></script>
  </body>
</html>
