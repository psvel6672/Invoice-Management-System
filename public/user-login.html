<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | Invoice Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="/login_assets/login.css" />
  </head>

  <body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
      <!-- LOGO / TITLE -->

      <div class="text-center mb-8 text-white">
        <h1 class="text-3xl font-bold tracking-wide">PS Invoice</h1>

        <p class="text-sm opacity-80 mt-1">Invoice Management System</p>
      </div>

      <!-- LOGIN CARD -->

      <div class="login-card bg-white rounded-xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold text-slate-800 text-center mb-6">
          Sign In
        </h2>

        <form class="space-y-5" id="userLoginForm">
          <!-- EMAIL -->

          <div>
            <label class="text-sm text-slate-600 mb-1 block"> Username </label>

            <div class="relative">
              <i
                class="fa fa-user absolute left-3 top-3 text-slate-400"
              ></i>

              <input
                type="text"
                id="username"
                placeholder="Enter username"
                class="input-field w-full border border-slate-200 rounded-lg pl-10 pr-3 py-2 focus:outline-none"
              />
            </div>
          </div>

          <!-- PASSWORD -->

          <div>
            <label class="text-sm text-slate-600 mb-1 block"> Password </label>

            <div class="relative">
              <i class="fa fa-lock absolute left-3 top-3 text-slate-400"></i>

              <input
                id="password"
                type="password"
                placeholder="Enter password"
                class="input-field w-full border border-slate-200 rounded-lg pl-10 pr-10 py-2 focus:outline-none"
              />

              <button
                type="button"
                id="togglePassword"
                class="absolute right-3 top-3 text-slate-400"
              >
                <i class="fa fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- OPTIONS -->

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-slate-600">
              <input type="checkbox" class="rounded" />

              Remember me
            </label>

            <!--<a href="#" class="text-blue-600 hover:underline">-->
            <!--Forgot password?-->
            <!--</a>-->
          </div>

          <!-- LOGIN BUTTON -->

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium transition"
          >
            Sign In
          </button>

          <!-- FOOTER -->

          <p class="text-xs text-slate-400 text-center mt-6">
            © 2026 Invoice Management System
          </p>
        </form>
      </div>
    </div>

    <script src="/login_assets/login.js"></script>
  </body>
</html>
